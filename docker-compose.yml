services:
  web:
    build: .
    command: bin/rails server -b 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
    volumes:
      - .:/rails
      - storage:/rails/storage
  jobs:
    build: .
    command: bin/jobs
    environment:
      RAILS_ENV: development
    volumes:
      - .:/rails
      - storage:/rails/storage
    depends_on:
      - web

volumes:
  storage:
