active_announcement:
  title: Welcome to the Community
  body: We are excited to have you join our sacred feminine community. Stay tuned for upcoming events!
  published_at: <%= 1.day.ago %>
  active: true
  created_by_id: <%= ActiveRecord::FixtureSet.identify(:admin) %>

inactive_announcement:
  title: Old Announcement
  body: This announcement is no longer active.
  published_at: <%= 1.week.ago %>
  active: false
  created_by_id: <%= ActiveRecord::FixtureSet.identify(:admin) %>

scheduled_announcement:
  title: Upcoming Retreat Info
  body: Details about the next retreat will be shared soon.
  published_at: <%= 1.week.from_now %>
  active: false
  created_by_id: <%= ActiveRecord::FixtureSet.identify(:admin) %>
