# Development uses solid_cable (matching production) so Turbo broadcasts from the
# Solid Queue worker process reach the browser — e.g. real-time unread dots.
development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
