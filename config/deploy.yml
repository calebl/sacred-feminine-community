service: sacred-feminine
image: calebl/sacred-feminine

servers:
  web:
    - 5.78.143.38
  # job:
  #   hosts:
  #     - 192.168.0.1
  #   cmd: bin/jobs

proxy:
  ssl: true
  host: sfn.caleblenoir.com

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - RESEND_API_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    # Update with your actual domain before deploying:
    APP_HOST: sfn.caleblenoir.com

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent volume for SQLite databases and Active Storage files
# Bind mount to Hetzner Cloud Volume at /mnt/file-storage
volumes:
  - "/mnt/file-storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
